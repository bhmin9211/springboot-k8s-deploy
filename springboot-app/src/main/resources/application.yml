server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/k8s_dashboard}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:1234}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        physical_naming_strategy: com.example.demo.config.jpa.UpperSnakeCaseNamingStrategy
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

app:
  jwt:
    secret: ${APP_JWT_SECRET:change-this-jwt-secret-key-for-production-2026}
    validity-ms: ${APP_JWT_VALIDITY_MS:3600000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  kubernetes:
    commands-enabled: ${APP_KUBERNETES_COMMANDS_ENABLED:true}
